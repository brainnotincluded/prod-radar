services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: brandradar
      POSTGRES_PASSWORD: brandradar
      POSTGRES_DB: brandradar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brandradar"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: services/api/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  collector:
    build:
      context: ./backend
      dockerfile: services/collector/Dockerfile
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  processor:
    build:
      context: ./backend
      dockerfile: services/processor/Dockerfile
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  enricher:
    build:
      context: ./backend
      dockerfile: services/enricher/Dockerfile
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      ml:
        condition: service_healthy
    restart: unless-stopped

  spike:
    build:
      context: ./backend
      dockerfile: services/spike/Dockerfile
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  alerter:
    build:
      context: ./backend
      dockerfile: services/alerter/Dockerfile
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  ml:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://brandradar:brandradar@postgres:5432/brandradar?sslmode=disable", "up"]
    profiles: ["migrate"]

volumes:
  pgdata:
  natsdata:
